<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Heritage salvage</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

  

  <main class="auth-page">
    <div class="auth-container register-wide fade-in">
      <div class="auth-header">
        <a href="index.html" class="logo-link">
          <img src="assets/images/favicon.svg" alt="Heritage Salvage" class="site-logo">
          <span class="logo-text">Heritage salvage</span>
        </a>
      </div>

      <h2 style="font-family: var(--font-heading); font-size: 1.5rem; white-space: nowrap;">Create your account</h2>
      <p>Join the Heritage Salvage community to start your journey.</p>
      
      <form id="registerForm" class="auth-form">
        <div class="form-group">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" name="firstName" class="auth-input" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" name="lastName" class="auth-input" placeholder="Doe" required>
          </div>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" class="auth-input" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="auth-input" placeholder="••••••••" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <small style="color: var(--color-text-muted); font-size: 0.75rem; margin-top: 4px; display: block;">Must be at least 8 characters long.</small>
        </div>
        
        <label class="form-checkbox">
          <input type="checkbox" required>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
      </form>

      <div class="auth-divider">OR</div>

      <div class="social-auth-btns">
        <button class="btn-social">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M17.057 12.783c.032 2.588 2.246 3.442 2.276 3.456-.021.066-.353 1.205-1.155 2.373-.693 1.01-1.412 2.015-2.535 2.036-1.096.021-1.454-.648-2.708-.648-1.253 0-1.652.628-2.688.669-1.077.041-1.894-.963-2.592-1.973-1.428-2.067-2.522-5.832-1.049-8.385.732-1.267 2.033-2.071 3.435-2.091 1.059-.021 2.06.711 2.706.711.646 0 1.861-.884 3.131-.754.534.022 2.034.215 2.997 1.624-.077.048-1.785 1.04-1.764 3.036-.002.001.002.001 0 .001zm-2.484-8.471c.583-.706.974-1.688.866-2.67-.843.034-1.865.561-2.469 1.266-.543.626-.957 1.628-.831 2.593.941.071 1.85-.483 2.434-1.189z"/></svg>
          Apple
        </button>
      </div>
      
      <div class="auth-switch">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </main>


  <script src="assets/js/main.js"></script>
</body>
</html>
