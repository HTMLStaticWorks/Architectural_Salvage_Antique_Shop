<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Heritage salvage</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

  

  <main class="auth-page">
    <div class="auth-container fade-in">
      <h2 style="font-family: var(--font-heading); font-size: 2rem;">Join the Legacy</h2>
      <p>Create an account to start your restoration journey.</p>
      
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" class="auth-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="auth-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="auth-input" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="auth-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Sign Up</button>
      </form>
      
      <div class="auth-switch">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </main>


  <script src="assets/js/main.js"></script>
</body>
</html>
