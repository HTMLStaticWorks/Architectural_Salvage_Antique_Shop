<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Heritage salvage</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

  

  <main class="auth-page">
    <div class="auth-container login-page fade-in">
      <div class="auth-header">
        <a href="index.html" class="logo-link">
          <img src="assets/images/favicon.svg" alt="Heritage Salvage" class="site-logo">
          <span class="logo-text">Heritage salvage</span>
        </a>
      </div>

      <h2 style="font-family: var(--font-heading); font-size: 2rem;">Welcome Back</h2>
      <p>Log in to access your saved treasures and orders.</p>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="auth-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label for="password" style="margin-bottom: 0;">Password</label>
            <a href="#" class="forgot-password" style="font-size: 0.8rem;">Forgot password?</a>
          </div>
          <input type="password" id="password" name="password" class="auth-input" placeholder="••••••••" required>
        </div>
        
        <div class="auth-extra">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
        </div>

        <button type="submit" class="btn btn-primary auth-btn">Log In</button>
      </form>

      <div class="auth-divider">OR</div>

      <div class="social-auth-btns">
        <button class="btn-social">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>
      
      <div class="auth-switch">
        Don't have an account? <a href="register.html">Sign Up</a>
      </div>
    </div>
  </main>


  <script src="assets/js/main.js"></script>
</body>
</html>
